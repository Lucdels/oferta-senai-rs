    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;
        
        // Função para recalcular dias e status dinamicamente baseado na data ATUAL do navegador
        const recalcularTurmas = (turmas) => {
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);

            return turmas.map(turma => {
                if (!turma.dataInicio) {
                    return turma;
                }

                // Parse da data de início
                const [ano, mes, dia] = turma.dataInicio.split('-').map(Number);
                const dataInicio = new Date(ano, mes - 1, dia);
                dataInicio.setHours(0, 0, 0, 0);

                // Calcular dias para início baseado em HOJE
                const diasParaInicio = Math.floor((dataInicio - hoje) / (1000 * 60 * 60 * 24));

                // Determinar status baseado na data ATUAL
                let status, acao, prioridade, urgenciaNivel, argumento, metaSemanal;
                const vagas = parseInt(turma.vagas) || 0;

                if (dataInicio < hoje) {
                    status = "Início passou";
                    acao = "🔍 Verificar com UO";
                    prioridade = "verificar";
                    urgenciaNivel = 0;
                    argumento = "Turma que passou data de início: Avaliar reoferta ou vagas remanescentes.";
                    metaSemanal = 0;
                } else {
                    status = "Planejada";
                    
                    if (diasParaInicio <= 15) {
                        acao = "🚀 Atacar Agora";
                        prioridade = "alta";
                        urgenciaNivel = 3;
                        argumento = "Turma próxima do início. Prioridade máxima de fechamento.";
                        metaSemanal = Math.max(1, Math.floor(vagas / 2));
                    } else if (diasParaInicio <= 45) {
                        acao = "⚡ Avançar Rápido";
                        prioridade = "media";
                        urgenciaNivel = 2;
                        argumento = "Turma em médio prazo. Intensificar prospecção.";
                        metaSemanal = Math.max(1, Math.floor(vagas / 6));
                    } else {
                        acao = "📅 Planejar Avanço";
                        prioridade = "baixa";
                        urgenciaNivel = 1;
                        argumento = "Turma futura. Preparar estratégia e pipeline.";
                        metaSemanal = Math.max(1, Math.floor(vagas / 12));
                    }
                }

                return {
                    ...turma,
                    diasParaInicio,
                    status,
                    acaoRecomendada: acao,
                    prioridade,
                    urgenciaNivel,
                    argumento,
                    metaSemanal
                };
            });
        };

            const [sortDirection, setSortDirection] = useState('asc');
            const [lastUpdate, setLastUpdate] = useState(new Date());
            const [turmasRecalculadas, setTurmasRecalculadas] = useState(() => recalcularTurmas(TURMAS_DATA));
            const [selectedTurmas, setSelectedTurmas] = useState(new Set());
            const [showPdfModal, setShowPdfModal] = useState(false);
            const [pdfConfig, setPdfConfig] = useState({
                nomeAgente: '',
                nomeCliente: '',
                emailCliente: '',
                telefoneCliente: '',
                observacoes: ''
            });
            const itemsPerPage = 20;

            // Auto-refresh a cada 1 minuto e recalcular turmas
            useEffect(() => {
                const interval = setInterval(() => {
                    const agora = new Date();
                    setLastUpdate(agora);
                    
                    // Recalcular turmas automaticamente com a data atual
                    const turmasAtualizadas = recalcularTurmas(TURMAS_DATA);
                    setTurmasRecalculadas(turmasAtualizadas);
                }, 60000); // Recalcula a cada 1 minuto
                
                return () => clearInterval(interval);
            }, []);

            // Usar turmas recalculadas em vez dos dados estáticos
            const TURMAS_DATA = turmasRecalculadas;

            // Aplicar filtros rápidos
            const applyQuickFilter = (filter) => {
                setQuickFilter(filter === quickFilter ? '' : filter);
                setFilterAcao('');
                setFilterStatus('');
            };

            // Filtrar turmas
            const filteredTurmas = useMemo(() => {
                return TURMAS_DATA.filter(turma => {
                    const matchSearch = searchTerm === '' || 
                        turma.curso.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        turma.unidade.toLowerCase().includes(searchTerm.toLowerCase());
                    
                    const matchRegiao = filterRegiao === '' || turma.regiao === filterRegiao;
                    const matchSubRegiao = filterSubRegiao === '' || turma.subRegiao === filterSubRegiao;
                    const matchStatus = filterStatus === '' || turma.status === filterStatus;
                    const matchAcao = filterAcao === '' || turma.acaoRecomendada === filterAcao;

                    // Filtros rápidos
                    let matchQuick = true;
                    if (quickFilter === 'urgente') {
                        matchQuick = turma.urgenciaNivel === 3;
                    } else if (quickFilter === 'proximo') {
                        matchQuick = turma.urgenciaNivel >= 2;
                    } else if (quickFilter === 'verificar') {
                        matchQuick = turma.prioridade === 'verificar';
                    }

                    return matchSearch && matchRegiao && matchSubRegiao && matchStatus && matchAcao && matchQuick;
                });
            }, [searchTerm, filterRegiao, filterSubRegiao, filterStatus, filterAcao, quickFilter]);

            // Ordenar turmas
            const sortedTurmas = useMemo(() => {
                if (!sortField) return filteredTurmas;

                return [...filteredTurmas].sort((a, b) => {
                    let aVal = a[sortField];
                    let bVal = b[sortField];

                    if (sortField === 'diasParaInicio') {
                        aVal = aVal === null ? 999999 : aVal;
                        bVal = bVal === null ? 999999 : bVal;
                    } else if (sortField === 'vagas') {
                        aVal = parseInt(aVal) || 0;
                        bVal = parseInt(bVal) || 0;
                    }

                    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });
            }, [filteredTurmas, sortField, sortDirection]);

            // Paginação
            const totalPages = Math.ceil(sortedTurmas.length / itemsPerPage);
            const paginatedTurmas = sortedTurmas.slice(
                (currentPage - 1) * itemsPerPage,
                currentPage * itemsPerPage
            );

            // Reset página ao filtrar
            useEffect(() => {
                setCurrentPage(1);
            }, [searchTerm, filterRegiao, filterSubRegiao, filterStatus, filterAcao, quickFilter]);

            // Estatísticas filtradas
            const filteredStats = useMemo(() => {
                const totalTurmas = filteredTurmas.length;
                const totalVagas = filteredTurmas.reduce((sum, t) => sum + (parseInt(t.vagas) || 0), 0);
                
                const planejadas = filteredTurmas.filter(t => t.status === 'Planejada').length;
                const inicioPasso = filteredTurmas.filter(t => t.status === 'Início passou').length;
                
                const atacarAgora = filteredTurmas.filter(t => t.acaoRecomendada === '🚀 Atacar Agora').length;
                const avancarRapido = filteredTurmas.filter(t => t.acaoRecomendada === '⚡ Avançar Rápido').length;
                const planejar = filteredTurmas.filter(t => t.acaoRecomendada === '📅 Planejar Avanço').length;
                const verificar = filteredTurmas.filter(t => t.acaoRecomendada === '🔍 Verificar com UO').length;

                return {
                    totalTurmas,
                    totalVagas,
                    planejadas,
                    inicioPasso,
                    atacarAgora,
                    avancarRapido,
                    planejar,
                    verificar
                };
            }, [filteredTurmas]);

            // Dados por região
            const regiaoData = useMemo(() => {
                const data = {};
                filteredTurmas.forEach(t => {
                    if (!data[t.regiao]) {
                        data[t.regiao] = { vagas: 0, turmas: 0, urgentes: 0 };
                    }
                    data[t.regiao].vagas += parseInt(t.vagas) || 0;
                    data[t.regiao].turmas++;
                    if (t.urgenciaNivel === 3) data[t.regiao].urgentes++;
                });
                
                const sorted = Object.entries(data)
                    .map(([regiao, info]) => ({ regiao, ...info }))
                    .sort((a, b) => b.vagas - a.vagas);
                
                return sorted;
            }, [filteredTurmas]);

            const maxVagas = Math.max(...regiaoData.map(r => r.vagas), 1);

            // Opções de filtro
            const regioes = [...new Set(TURMAS_DATA.map(t => t.regiao))].sort();
            const subRegioes = [...new Set(TURMAS_DATA.map(t => t.subRegiao))].sort();
            const statusOptions = [...new Set(TURMAS_DATA.map(t => t.status))];
            const acaoOptions = [...new Set(TURMAS_DATA.map(t => t.acaoRecomendada))];

            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                const [year, month, day] = dateStr.split('-');
                return `${day}/${month}/${year}`;
            };

            const handleSort = (field) => {
                if (sortField === field) {
                    setSortDirection(sortDirection === 'asc' ? 'desc' : 'asc');
                } else {
                    setSortField(field);
                    setSortDirection('asc');
                }
            };

            // Funções de seleção
            const toggleSelectTurma = (turmaId) => {
                const newSelected = new Set(selectedTurmas);
                if (newSelected.has(turmaId)) {
                    newSelected.delete(turmaId);
                } else {
                    newSelected.add(turmaId);
                }
                setSelectedTurmas(newSelected);
            };

            const toggleSelectAll = () => {
                if (selectedTurmas.size === paginatedTurmas.length) {
                    setSelectedTurmas(new Set());
                } else {
                    setSelectedTurmas(new Set(paginatedTurmas.map(t => t.id)));
                }
            };

            const clearSelection = () => {
                setSelectedTurmas(new Set());
            };

            const getSelectedTurmasData = () => {
                return TURMAS_DATA.filter(t => selectedTurmas.has(t.id));
            };

            // Gerar PDF
            const generatePDF = () => {
                if (selectedTurmas.size === 0) return;
                setShowPdfModal(true);
            };

            const confirmGeneratePDF = async () => {
                const selectedData = getSelectedTurmasData();
                const doc = new jsPDF();
                
                // Configurações
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 20;
                const lineHeight = 7;
                let yPos = margin;

                // Função para adicionar nova página se necessário
                const checkNewPage = (neededSpace = 10) => {
                    if (yPos + neededSpace > pageHeight - margin) {
                        doc.addPage();
                        yPos = margin;
                        return true;
                    }
                    return false;
                };

                // Header com logo SENAI (simulado com retângulo)
                doc.setFillColor(0, 70, 127); // Azul SENAI
                doc.rect(0, 0, pageWidth, 30, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(20);
                doc.setFont('helvetica', 'bold');
                doc.text('SENAI RS', margin, 15);
                doc.setFontSize(12);
                doc.setFont('helvetica', 'normal');
                doc.text('Jovem Aprendiz - Aprendizagem Industrial', margin, 23);

                yPos = 45;

                // Título
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(16);
                doc.setFont('helvetica', 'bold');
                doc.text('PROPOSTA COMERCIAL - TURMAS SELECIONADAS', margin, yPos);
                yPos += 15;

                // Informações do agente e cliente
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                
                if (pdfConfig.nomeAgente) {
                    doc.text(`Agente Comercial: ${pdfConfig.nomeAgente}`, margin, yPos);
                    yPos += lineHeight;
                }

                doc.setFont('helvetica', 'bold');
                doc.text('DADOS DO CLIENTE:', margin, yPos);
                yPos += lineHeight;
                doc.setFont('helvetica', 'normal');

                if (pdfConfig.nomeCliente) {
                    doc.text(`Nome/Empresa: ${pdfConfig.nomeCliente}`, margin + 5, yPos);
                    yPos += lineHeight;
                }
                if (pdfConfig.emailCliente) {
                    doc.text(`E-mail: ${pdfConfig.emailCliente}`, margin + 5, yPos);
                    yPos += lineHeight;
                }
                if (pdfConfig.telefoneCliente) {
                    doc.text(`Telefone: ${pdfConfig.telefoneCliente}`, margin + 5, yPos);
                    yPos += lineHeight;
                }

                yPos += 5;

                // Data da proposta
                const today = new Date();
                doc.text(`Data: ${today.toLocaleDateString('pt-BR')}`, margin, yPos);
                yPos += 10;

                // Linha separadora
                doc.setDrawColor(0, 70, 127);
                doc.setLineWidth(0.5);
                doc.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 10;

                // Resumo
                doc.setFontSize(12);
                doc.setFont('helvetica', 'bold');
                doc.text('RESUMO DA PROPOSTA', margin, yPos);
                yPos += lineHeight;

                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                const totalVagasSelecionadas = selectedData.reduce((sum, t) => sum + (parseInt(t.vagas) || 0), 0);
                doc.text(`Total de Turmas Selecionadas: ${selectedData.length}`, margin, yPos);
                yPos += lineHeight;
                doc.text(`Total de Vagas Disponíveis: ${totalVagasSelecionadas}`, margin, yPos);
                yPos += 12;

                // Observações
                if (pdfConfig.observacoes) {
                    checkNewPage(20);
                    doc.setFont('helvetica', 'bold');
                    doc.text('OBSERVAÇÕES:', margin, yPos);
                    yPos += lineHeight;
                    doc.setFont('helvetica', 'normal');
                    
                    const obsLines = doc.splitTextToSize(pdfConfig.observacoes, pageWidth - 2 * margin);
                    obsLines.forEach(line => {
                        checkNewPage();
                        doc.text(line, margin, yPos);
                        yPos += lineHeight;
                    });
                    yPos += 5;
                }

                // Linha separadora
                checkNewPage();
                doc.setDrawColor(0, 70, 127);
                doc.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 10;

                // Lista de turmas
                doc.setFontSize(12);
                doc.setFont('helvetica', 'bold');
                doc.text('TURMAS DISPONÍVEIS', margin, yPos);
                yPos += 10;

                // Para cada turma selecionada
                selectedData.forEach((turma, index) => {
                    checkNewPage(45);

                    // Box para cada turma
                    const boxHeight = 40;
                    doc.setFillColor(245, 247, 250);
                    doc.rect(margin, yPos, pageWidth - 2 * margin, boxHeight, 'F');
                    
                    yPos += 7;

                    // Número da turma
                    doc.setFontSize(9);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(102, 126, 234);
                    doc.text(`TURMA ${index + 1}`, margin + 5, yPos);
                    
                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(10);
                    doc.setFont('helvetica', 'bold');
                    yPos += 5;
                    
                    // Nome do curso
                    const cursoLines = doc.splitTextToSize(turma.curso, pageWidth - 2 * margin - 10);
                    doc.text(cursoLines[0], margin + 5, yPos);
                    yPos += lineHeight;

                    // Detalhes
                    doc.setFontSize(9);
                    doc.setFont('helvetica', 'normal');
                    doc.text(`Unidade: ${turma.unidade}`, margin + 5, yPos);
                    yPos += 5;
                    doc.text(`Região: ${turma.regiao} - ${turma.subRegiao}`, margin + 5, yPos);
                    yPos += 5;
                    doc.text(`Formato: ${turma.formato} | Carga Horária: ${turma.ch}h`, margin + 5, yPos);
                    yPos += 5;
                    
                    doc.setFont('helvetica', 'bold');
                    doc.text(`Vagas: ${turma.vagas} | Início: ${formatDate(turma.dataInicio)}`, margin + 5, yPos);
                    
                    yPos += 15;
                });

                // Footer
                const addFooter = (pageNum) => {
                    doc.setFontSize(8);
                    doc.setTextColor(100, 100, 100);
                    doc.text(
                        `SENAI RS - Jovem Aprendiz | Página ${pageNum}`,
                        pageWidth / 2,
                        pageHeight - 10,
                        { align: 'center' }
                    );
                    doc.text(
                        `Gerado em ${today.toLocaleDateString('pt-BR')} às ${today.toLocaleTimeString('pt-BR')}`,
                        pageWidth / 2,
                        pageHeight - 5,
                        { align: 'center' }
                    );
                };

                // Adicionar footer em todas as páginas
                const totalPagesExp = doc.internal.getNumberOfPages();
                for (let i = 1; i <= totalPagesExp; i++) {
                    doc.setPage(i);
                    addFooter(i);
                }

                // Salvar PDF
                const fileName = `SENAI_Proposta_${pdfConfig.nomeCliente.replace(/\s+/g, '_') || 'Cliente'}_${today.toISOString().split('T')[0]}.pdf`;
                doc.save(fileName);

                setShowPdfModal(false);
                setPdfConfig({
                    nomeAgente: '',
                    nomeCliente: '',
                    emailCliente: '',
                    telefoneCliente: '',
                    observacoes: ''
                });
            };

            const exportCSV = () => {
                const headers = ['ID', 'Unidade', 'Região', 'Sub-Região', 'Curso', 'Formato', 'CH', 'Vagas', 'Data Início', 'Dias para Início', 'Status', 'Ação', 'Prioridade', 'Meta Semanal'];
                const rows = sortedTurmas.map(t => [
                    t.id, t.unidade, t.regiao, t.subRegiao, t.curso, t.formato, t.ch, t.vagas,
                    formatDate(t.dataInicio), t.diasParaInicio || '-', t.status, t.acaoRecomendada, t.prioridade, t.metaSemanal
                ]);
                
                const csv = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
                const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `oferta_turmas_senai_rs_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

            const clearAllFilters = () => {
                setSearchTerm('');
                setFilterRegiao('');
                setFilterSubRegiao('');
                setFilterStatus('');
                setFilterAcao('');
                setQuickFilter('');
            };

            return (
                <div className="container">
                    {/* Header */}
                    <div className="header">
                        <div className="logo-section">
                            <div className="logo">O</div>
                            <div>
                                <div className="header-title">Oferta</div>
                                <div className="header-subtitle">PLANEJAMENTO DE TURMAS 2026</div>
                            </div>
                        </div>
                        <div className="header-right">
                            <div className="auto-update-badge">
                                <div className="pulse"></div>
                                Atualização automática • {lastUpdate.toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'})}
                            </div>
                            <div className="view-toggle">
                                <button 
                                    className={`view-btn ${viewMode === 'lista' ? 'active' : ''}`}
                                    onClick={() => setViewMode('lista')}
                                >
                                    📋 Lista
                                </button>
                                <button 
                                    className={`view-btn ${viewMode === 'visao' ? 'active' : ''}`}
                                    onClick={() => setViewMode('visao')}
                                >
                                    🗺️ Visão Regional
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Barra de Seleção */}
                    {selectedTurmas.size > 0 && (
                        <div className="selection-bar">
                            <div className="selection-info">
                                <div className="selection-count">
                                    <span className="count-badge">{selectedTurmas.size}</span>
                                    {selectedTurmas.size === 1 ? 'turma selecionada' : 'turmas selecionadas'}
                                </div>
                                <div style={{fontSize: '14px', opacity: 0.9}}>
                                    {getSelectedTurmasData().reduce((sum, t) => sum + (parseInt(t.vagas) || 0), 0)} vagas totais
                                </div>
                            </div>
                            <div className="selection-actions">
                                <button className="btn-pdf" onClick={generatePDF}>
                                    📄 Gerar Proposta PDF
                                </button>
                                <button className="btn-clear" onClick={clearSelection}>
                                    🗑️ Limpar Seleção
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Stats Grid */}
                    <div className="stats-grid">
                        <div className="stat-card blue">
                            <div className="stat-label">Total Turmas</div>
                            <div className="stat-value">{filteredStats.totalTurmas}</div>
                        </div>
                        <div className="stat-card green">
                            <div className="stat-label">Total Vagas</div>
                            <div className="stat-value">{filteredStats.totalVagas.toLocaleString('pt-BR')}</div>
                        </div>
                        <div className="stat-card purple">
                            <div className="stat-label">Planejadas</div>
                            <div className="stat-value">
                                {filteredStats.planejadas}
                                <span className="stat-trend trend-neutral">
                                    {((filteredStats.planejadas / filteredStats.totalTurmas) * 100).toFixed(0)}%
                                </span>
                            </div>
                        </div>
                        <div className="stat-card red">
                            <div className="stat-label">🚀 Atacar Agora</div>
                            <div className="stat-value">{filteredStats.atacarAgora}</div>
                        </div>
                        <div className="stat-card orange">
                            <div className="stat-label">⚡ Avançar Rápido</div>
                            <div className="stat-value">{filteredStats.avancarRapido}</div>
                        </div>
                        <div className="stat-card teal">
                            <div className="stat-label">📅 Planejar Avanço</div>
                            <div className="stat-value">{filteredStats.planejar}</div>
                        </div>
                        <div className="stat-card pink">
                            <div className="stat-label">🔍 Verificar com UO</div>
                            <div className="stat-value">
                                {filteredStats.verificar}
                                {filteredStats.verificar > 0 && (
                                    <span className="stat-trend trend-up">!</span>
                                )}
                            </div>
                        </div>
                    </div>

                    {viewMode === 'visao' ? (
                        <>
                            {/* Main Grid - Visão Regional */}
                            <div className="main-grid">
                                <div className="card">
                                    <div className="card-title">Distribuição por Região</div>
                                    {regiaoData.map(r => (
                                        <div key={r.regiao} className="region-bar">
                                            <div className="region-label">
                                                <span className="region-name">{r.regiao}</span>
                                                <span className="region-value">{r.vagas} vagas • {r.turmas} turmas</span>
                                            </div>
                                            <div className="bar-container">
                                                <div 
                                                    className="bar-fill" 
                                                    style={{width: `${(r.vagas / maxVagas) * 100}%`}}
                                                />
                                            </div>
                                        </div>
                                    ))}

                                    <div className="card-title" style={{marginTop: '32px'}}>
                                        Distribuição por Prioridade
                                    </div>
                                    <div className="priority-distribution">
                                        <div className="priority-item">
                                            <div className="priority-count" style={{color: '#dc2626'}}>
                                                {filteredStats.atacarAgora}
                                            </div>
                                            <div className="priority-label">🚀 Alta</div>
                                        </div>
                                        <div className="priority-item">
                                            <div className="priority-count" style={{color: '#ea580c'}}>
                                                {filteredStats.avancarRapido}
                                            </div>
                                            <div className="priority-label">⚡ Média</div>
                                        </div>
                                        <div className="priority-item">
                                            <div className="priority-count" style={{color: '#16a34a'}}>
                                                {filteredStats.planejar}
                                            </div>
                                            <div className="priority-label">📅 Baixa</div>
                                        </div>
                                        <div className="priority-item">
                                            <div className="priority-count" style={{color: '#f59e0b'}}>
                                                {filteredStats.verificar}
                                            </div>
                                            <div className="priority-label">🔍 Verificar</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="card">
                                    <div className="card-title">Visão Territorial</div>
                                    <div className="territorial-grid">
                                        {regiaoData.map(r => (
                                            <div key={r.regiao} className="territorial-item">
                                                <div className="territorial-info">
                                                    <div className="territorial-region">{r.regiao}</div>
                                                    <div className="territorial-stats">
                                                        {r.turmas} turmas
                                                        {r.urgentes > 0 && ` • ${r.urgentes} urgente${r.urgentes > 1 ? 's' : ''}`}
                                                    </div>
                                                </div>
                                                <div>
                                                    <div className="territorial-vagas">{r.vagas}</div>
                                                    {r.urgentes > 0 && (
                                                        <div className="territorial-priority">
                                                            {r.urgentes > 5 ? '🔥' : r.urgentes > 2 ? '⚡' : '📌'}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </>
                    ) : null}

                    {/* Table Section */}
                    <div className="table-section">
                        <div className="table-header">
                            <div className="filter-row">
                                <input
                                    type="text"
                                    className="search-input"
                                    placeholder="🔍 Buscar curso ou unidade..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <select 
                                    className="filter-select"
                                    value={filterRegiao}
                                    onChange={(e) => setFilterRegiao(e.target.value)}
                                >
                                    <option value="">Todas as Regiões</option>
                                    {regioes.map(r => (
                                        <option key={r} value={r}>{r}</option>
                                    ))}
                                </select>
                                <select 
                                    className="filter-select"
                                    value={filterSubRegiao}
                                    onChange={(e) => setFilterSubRegiao(e.target.value)}
                                >
                                    <option value="">Todas as Sub-Regiões</option>
                                    {subRegioes.map(sr => (
                                        <option key={sr} value={sr}>{sr}</option>
                                    ))}
                                </select>
                                <select 
                                    className="filter-select"
                                    value={filterStatus}
                                    onChange={(e) => setFilterStatus(e.target.value)}
                                >
                                    <option value="">Todos os Status</option>
                                    {statusOptions.map(s => (
                                        <option key={s} value={s}>{s}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="filter-row">
                                <div className="quick-filters">
                                    <div 
                                        className={`quick-filter-chip ${quickFilter === 'urgente' ? 'active' : ''}`}
                                        onClick={() => applyQuickFilter('urgente')}
                                    >
                                        🚀 Urgentes ({filteredStats.atacarAgora})
                                    </div>
                                    <div 
                                        className={`quick-filter-chip ${quickFilter === 'proximo' ? 'active' : ''}`}
                                        onClick={() => applyQuickFilter('proximo')}
                                    >
                                        ⚡ Próximas ({filteredStats.atacarAgora + filteredStats.avancarRapido})
                                    </div>
                                    <div 
                                        className={`quick-filter-chip ${quickFilter === 'verificar' ? 'active' : ''}`}
                                        onClick={() => applyQuickFilter('verificar')}
                                    >
                                        🔍 Verificar ({filteredStats.verificar})
                                    </div>
                                </div>
                                <div className="action-buttons">
                                    <button className="btn btn-secondary" onClick={clearAllFilters}>
                                        🔄 Limpar Filtros
                                    </button>
                                    <button className="btn btn-primary" onClick={exportCSV}>
                                        📥 Exportar CSV
                                    </button>
                                </div>
                            </div>
                        </div>

                        {sortedTurmas.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-icon">🔍</div>
                                <h3>Nenhuma turma encontrada</h3>
                                <p>Tente ajustar os filtros para ver mais resultados</p>
                            </div>
                        ) : (
                            <>
                                <div className="table-container">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th className="checkbox-cell">
                                                    <input 
                                                        type="checkbox"
                                                        className="checkbox-custom"
                                                        checked={selectedTurmas.size === paginatedTurmas.length && paginatedTurmas.length > 0}
                                                        onChange={toggleSelectAll}
                                                    />
                                                </th>
                                                <th onClick={() => handleSort('unidade')}>
                                                    Unidade / Região
                                                    {sortField === 'unidade' && (
                                                        <span className="sort-indicator">{sortDirection === 'asc' ? '▲' : '▼'}</span>
                                                    )}
                                                </th>
                                                <th onClick={() => handleSort('curso')}>
                                                    Curso / Modalidade
                                                    {sortField === 'curso' && (
                                                        <span className="sort-indicator">{sortDirection === 'asc' ? '▲' : '▼'}</span>
                                                    )}
                                                </th>
                                                <th>Formato</th>
                                                <th onClick={() => handleSort('diasParaInicio')}>
                                                    Data / Dias
                                                    {sortField === 'diasParaInicio' && (
                                                        <span className="sort-indicator">{sortDirection === 'asc' ? '▲' : '▼'}</span>
                                                    )}
                                                </th>
                                                <th onClick={() => handleSort('vagas')}>
                                                    Vagas / Meta
                                                    {sortField === 'vagas' && (
                                                        <span className="sort-indicator">{sortDirection === 'asc' ? '▲' : '▼'}</span>
                                                    )}
                                                </th>
                                                <th>Status</th>
                                                <th onClick={() => handleSort('urgenciaNivel')}>
                                                    Ação Recomendada
                                                    {sortField === 'urgenciaNivel' && (
                                                        <span className="sort-indicator">{sortDirection === 'asc' ? '▲' : '▼'}</span>
                                                    )}
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {paginatedTurmas.map((turma, idx) => (
                                                <tr 
                                                    key={turma.id || idx}
                                                    className={selectedTurmas.has(turma.id) ? 'selected' : ''}
                                                >
                                                    <td className="checkbox-cell">
                                                        <input 
                                                            type="checkbox"
                                                            className="checkbox-custom"
                                                            checked={selectedTurmas.has(turma.id)}
                                                            onChange={() => toggleSelectTurma(turma.id)}
                                                        />
                                                    </td>
                                                    <td>
                                                        <div style={{fontWeight: 600, marginBottom: 4}}>{turma.unidade}</div>
                                                        <div style={{fontSize: 12, color: '#666'}}>
                                                            {turma.regiao} • {turma.subRegiao}
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <div style={{fontWeight: 500, marginBottom: 4}}>{turma.curso}</div>
                                                        <div style={{fontSize: 12, color: '#666'}}>{turma.modalidade}</div>
                                                    </td>
                                                    <td>
                                                        <div>{turma.formato}</div>
                                                        <div style={{fontSize: 12, color: '#666'}}>{turma.ch}h</div>
                                                    </td>
                                                    <td>
                                                        <div style={{marginBottom: 4}}>{formatDate(turma.dataInicio)}</div>
                                                        {turma.diasParaInicio !== null && (
                                                            <div style={{
                                                                fontSize: 12, 
                                                                color: turma.diasParaInicio < 0 ? '#dc2626' : turma.diasParaInicio <= 15 ? '#ea580c' : '#666',
                                                                fontWeight: turma.diasParaInicio <= 15 ? 600 : 400
                                                            }}>
                                                                {turma.diasParaInicio < 0 ? 'há ' : 'em '}
                                                                {Math.abs(turma.diasParaInicio)} dias
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td>
                                                        <div style={{fontWeight: 600, marginBottom: 4}}>
                                                            {turma.vagas} Vagas
                                                            {turma.metaSemanal > 0 && (
                                                                <span className="meta-badge">
                                                                    Meta: {turma.metaSemanal}/sem
                                                                </span>
                                                            )}
                                                        </div>
                                                        <div style={{fontSize: 11, color: '#666'}}>
                                                            {turma.valor.length > 20 ? turma.valor.substring(0, 20) + '...' : turma.valor}
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <span className={`status-badge ${turma.status === 'Planejada' ? 'status-planejada' : 'status-passou'}`}>
                                                            {turma.status}
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <div className="argumento-tooltip">
                                                            <span className={`priority-badge priority-${turma.prioridade}`}>
                                                                <span className="priority-indicator"></span>
                                                                {turma.acaoRecomendada}
                                                            </span>
                                                            <span className="tooltip-text">{turma.argumento}</span>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="footer-info">
                                    <div>
                                        Exibindo {((currentPage - 1) * itemsPerPage) + 1} a {Math.min(currentPage * itemsPerPage, sortedTurmas.length)} de {sortedTurmas.length} turmas
                                    </div>
                                    {totalPages > 1 && (
                                        <div className="pagination">
                                            <button 
                                                className="page-btn" 
                                                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                                disabled={currentPage === 1}
                                            >
                                                ‹
                                            </button>
                                            {[...Array(Math.min(5, totalPages))].map((_, i) => {
                                                let pageNum;
                                                if (totalPages <= 5) {
                                                    pageNum = i + 1;
                                                } else if (currentPage <= 3) {
                                                    pageNum = i + 1;
                                                } else if (currentPage >= totalPages - 2) {
                                                    pageNum = totalPages - 4 + i;
                                                } else {
                                                    pageNum = currentPage - 2 + i;
                                                }
                                                return (
                                                    <button
                                                        key={i}
                                                        className={`page-btn ${currentPage === pageNum ? 'active' : ''}`}
                                                        onClick={() => setCurrentPage(pageNum)}
                                                    >
                                                        {pageNum}
                                                    </button>
                                                );
                                            })}
                                            <button 
                                                className="page-btn" 
                                                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                                disabled={currentPage === totalPages}
                                            >
                                                ›
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </>
                        )}
                    </div>

                    {/* Modal de configuração do PDF */}
                    {showPdfModal && (
                        <div className="modal-overlay" onClick={() => setShowPdfModal(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <div className="modal-title">Gerar Proposta Comercial</div>
                                    <div className="modal-subtitle">
                                        {selectedTurmas.size} turma{selectedTurmas.size > 1 ? 's' : ''} selecionada{selectedTurmas.size > 1 ? 's' : ''}
                                    </div>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Nome do Agente Comercial</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        value={pdfConfig.nomeAgente}
                                        onChange={(e) => setPdfConfig({...pdfConfig, nomeAgente: e.target.value})}
                                        placeholder="Seu nome"
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Nome do Cliente / Empresa *</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        value={pdfConfig.nomeCliente}
                                        onChange={(e) => setPdfConfig({...pdfConfig, nomeCliente: e.target.value})}
                                        placeholder="Nome da empresa ou cliente"
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">E-mail do Cliente</label>
                                    <input
                                        type="email"
                                        className="form-input"
                                        value={pdfConfig.emailCliente}
                                        onChange={(e) => setPdfConfig({...pdfConfig, emailCliente: e.target.value})}
                                        placeholder="email@empresa.com.br"
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Telefone do Cliente</label>
                                    <input
                                        type="tel"
                                        className="form-input"
                                        value={pdfConfig.telefoneCliente}
                                        onChange={(e) => setPdfConfig({...pdfConfig, telefoneCliente: e.target.value})}
                                        placeholder="(51) 99999-9999"
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Observações / Mensagem para o Cliente</label>
                                    <textarea
                                        className="form-textarea"
                                        value={pdfConfig.observacoes}
                                        onChange={(e) => setPdfConfig({...pdfConfig, observacoes: e.target.value})}
                                        placeholder="Adicione informações adicionais sobre a proposta..."
                                    />
                                </div>

                                <div className="modal-actions">
                                    <button 
                                        className="btn-cancel"
                                        onClick={() => setShowPdfModal(false)}
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        className="btn-generate"
                                        onClick={confirmGeneratePDF}
                                        disabled={!pdfConfig.nomeCliente}
                                    >
                                        📄 Gerar PDF
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

       const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
