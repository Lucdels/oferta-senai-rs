<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Oferta SENAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 12px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #0066cc;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    const e = React.createElement;

    function App() {

      function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.text("Relatório SENAI", 10, 10);
        doc.save("relatorio.pdf");
      }

      return e("div", { className: "container" },

        e("div", { className: "card" },
          e("h2", null, "Sistema de Oferta SENAI"),
          e("p", null, "Aplicação funcionando no GitHub Pages ✔"),
          e("button", { onClick: gerarPDF }, "Gerar PDF")
        )

      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(e(App));
  </script>
</body>
</html>
